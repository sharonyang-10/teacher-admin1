<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>昆蟲學習站 — 教師後台</title>
  <script>
    // ★ 請將 Google Apps Script 部署 URL 填入下方（與學生端相同）
    const GAS_URL = "https://script.google.com/macros/s/AKfycby4e-P0O0ZEaFgXZUzsk-h6vmKq3HYji5YQ9QKuHoS-aKWhRR3j3xTQJC-hIdOjDbxXfg/exec";
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', '微軟正黑體', sans-serif;
      background: #f0f4f8;
      color: #1a2a1a;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1b5e20, #2e7d32);
      color: white;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
    header p   { font-size: 0.82rem; opacity: 0.8; margin-top: 2px; }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Login ── */
    #login-section {
      max-width: 400px;
      margin: 80px auto;
      background: white;
      border-radius: 20px;
      padding: 36px 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      text-align: center;
    }
    #login-section h2 { font-size: 1.2rem; color: #1b5e20; margin-bottom: 8px; }
    #login-section p  { font-size: 0.85rem; color: #777; margin-bottom: 24px; }
    .pw-field {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .pw-field input {
      flex: 1;
      border: 2px solid #c8e6c9;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .pw-field input:focus { border-color: #43a047; }
    #btn-login {
      background: #2e7d32;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-login:hover { background: #1b5e20; }
    #login-error { color: #c62828; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 24px 28px 48px; }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 14px;
      padding: 16px 22px;
      min-width: 130px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    .stat-card .val { font-size: 2rem; font-weight: 700; color: #2e7d32; }
    .stat-card .lbl { font-size: 0.78rem; color: #777; margin-top: 2px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ctrl-btn {
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.5px;
    }
    .ctrl-btn:hover { opacity: 0.82; }
    .btn-refresh { background: #43a047; color: white; }
    .btn-export  { background: #1565c0; color: white; }
    .btn-clear   { background: #ef5350; color: white; }
    .filter-input {
      border: 2px solid #c8e6c9;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
      min-width: 180px;
    }
    .filter-input:focus { border-color: #43a047; }
    #last-updated { font-size: 0.8rem; color: #aaa; margin-left: auto; }

    /* Table */
    .table-wrap {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    thead tr { background: #2e7d32; color: white; }
    thead th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 700;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    tbody tr:hover { background: #f1f8f1; }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 11px 14px; vertical-align: top; }
    .td-time   { color: #999; font-size: 0.78rem; white-space: nowrap; }
    .td-class  { font-weight: 600; }
    .td-num    { text-align: center; }
    .td-name   { font-weight: 700; color: #1b5e20; }
    .td-zone   { color: #444; line-height: 1.6; }
    .td-pool   { color: #ef5350; font-size: 0.82rem; }

    /* Zone chips */
    .zone-chip {
      display: inline-block;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 3px;
      margin-bottom: 2px;
    }
    .chip-fly   { background: #bbdefb; color: #1565c0; }
    .chip-climb { background: #ffecb3; color: #e65100; }
    .chip-jump  { background: #e1bee7; color: #6a1b9a; }
    .chip-swim  { background: #b2ebf2; color: #006064; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 1rem;
    }
    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* Auto-refresh badge */
    .auto-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 3px 12px;
      font-size: 0.76rem;
      letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 700px) {
      header { flex-direction: column; }
      #dashboard { padding: 16px; }
      table { font-size: 0.78rem; }
      thead th, tbody td { padding: 9px 10px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🌿 昆蟲學習站 — 教師後台</h1>
    <p>即時查看學生作答情形 <span class="auto-badge">⏱ 每 30 秒自動更新</span></p>
  </div>
</header>

<!-- Login -->
<div id="login-section">
  <h2>🔐 教師登入</h2>
  <p>請輸入教師密碼以進入後台</p>
  <div class="pw-field">
    <input type="password" id="pw-input" placeholder="教師密碼" onkeydown="if(event.key==='Enter') doLogin()">
    <button id="btn-login" onclick="doLogin()">登入</button>
  </div>
  <div id="login-error"></div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="stats-row">
    <div class="stat-card"><div class="val" id="stat-total">0</div><div class="lbl">已作答人數</div></div>
    <div class="stat-card"><div class="val" id="stat-fly">0</div><div class="lbl">飛行比賽（含）</div></div>
    <div class="stat-card"><div class="val" id="stat-climb">0</div><div class="lbl">攀爬比賽（含）</div></div>
    <div class="stat-card"><div class="val" id="stat-jump">0</div><div class="lbl">跳遠比賽（含）</div></div>
    <div class="stat-card"><div class="val" id="stat-swim">0</div><div class="lbl">游泳比賽（含）</div></div>
    <div class="stat-card"><div class="val" id="stat-unfinished">0</div><div class="lbl">有未分類者</div></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-refresh" onclick="loadRecords()">🔄 立即更新</button>
    <button class="ctrl-btn btn-export"  onclick="exportCSV()">📥 匯出 CSV</button>
    <button class="ctrl-btn btn-clear"   onclick="clearRecords()">🗑️ 清空資料</button>
    <input class="filter-input" id="filter-input" type="text" placeholder="🔍 篩選班級 / 姓名" oninput="filterTable()">
    <span id="last-updated"></span>
  </div>

  <div class="table-wrap">
    <table id="records-table">
      <thead>
        <tr>
          <th>送出時間</th>
          <th>班級</th>
          <th>座號</th>
          <th>姓名</th>
          <th>✈️ 飛行比賽</th>
          <th>🧗 攀爬比賽</th>
          <th>🦘 跳遠比賽</th>
          <th>🏊 游泳比賽</th>
          <th>⚠️ 未分類</th>
        </tr>
      </thead>
      <tbody id="records-body">
        <tr><td colspan="9"><div class="empty-state"><span>📋</span>尚無資料，等待學生送出…</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let teacherPassword = '';
let allRecords = [];
let autoTimer = null;

// ── Login ──
function doLogin() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  teacherPassword = pw;

  if (!GAS_URL) {
    // Demo mode without backend
    document.getElementById('login-error').textContent = '⚠️ 尚未設定後端網址（GAS_URL）';
    return;
  }

  fetch(`${GAS_URL}?action=getRecords&password=${encodeURIComponent(pw)}`)
    .then(r => r.json())
    .then(data => {
      if (!data.ok) {
        document.getElementById('login-error').textContent = '❌ ' + (data.error || '登入失敗');
        return;
      }
      // Success
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      allRecords = data.records || [];
      renderTable(allRecords);
      updateStats(allRecords);
      // Auto refresh every 30s
      autoTimer = setInterval(loadRecords, 30000);
    })
    .catch(() => {
      document.getElementById('login-error').textContent = '❌ 連線失敗，請確認後端網址是否正確';
    });
}

// ── Load records ──
function loadRecords() {
  if (!GAS_URL || !teacherPassword) return;
  fetch(`${GAS_URL}?action=getRecords&password=${encodeURIComponent(teacherPassword)}`)
    .then(r => r.json())
    .then(data => {
      if (!data.ok) return;
      allRecords = data.records || [];
      updateStats(allRecords);
      filterTable(); // 保留目前篩選條件重新渲染
      document.getElementById('last-updated').textContent =
        '最後更新：' + new Date().toLocaleTimeString('zh-TW');
    })
    .catch(() => {});
}

// ── Stats ──
function updateStats(records) {
  document.getElementById('stat-total').textContent = records.length;
  document.getElementById('stat-fly').textContent   = records.filter(r => r.fly).length;
  document.getElementById('stat-climb').textContent = records.filter(r => r.climb).length;
  document.getElementById('stat-jump').textContent  = records.filter(r => r.jump).length;
  document.getElementById('stat-swim').textContent  = records.filter(r => r.swim).length;
  document.getElementById('stat-unfinished').textContent = records.filter(r => r.pool).length;
}

// ── Render table ──
function renderTable(records) {
  const tbody = document.getElementById('records-body');
  if (!records.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty-state"><span>📋</span>尚無資料，等待學生送出…</div></td></tr>`;
    return;
  }
  tbody.innerHTML = records.map(r => `
    <tr>
      <td class="td-time">${r.time || ''}</td>
      <td class="td-class">${esc(r.class)}</td>
      <td class="td-num">${esc(r.number)}</td>
      <td class="td-name">${esc(r.name)}</td>
      <td class="td-zone">${chips(r.fly, 'fly')}</td>
      <td class="td-zone">${chips(r.climb, 'climb')}</td>
      <td class="td-zone">${chips(r.jump, 'jump')}</td>
      <td class="td-zone">${chips(r.swim, 'swim')}</td>
      <td class="td-pool">${r.pool ? esc(r.pool) : '<span style="color:#aaa">—</span>'}</td>
    </tr>
  `).join('');
}

function chips(str, zone) {
  if (!str) return '<span style="color:#ccc">—</span>';
  return str.split('、').filter(Boolean).map(n =>
    `<span class="zone-chip chip-${zone}">${esc(n)}</span>`
  ).join('');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Filter ──
function filterTable() {
  const q = document.getElementById('filter-input').value.trim().toLowerCase();
  if (!q) {
    renderTable(allRecords);
    return;
  }
  const filtered = allRecords.filter(r => {
    // 將整筆資料所有欄位合併成一個字串來比對，避免欄位名稱不一致問題
    const combined = [r.class, r.name, r.number, r.time]
      .map(v => String(v || '').toLowerCase())
      .join(' ');
    return combined.includes(q);
  });
  renderTable(filtered);
}

// ── Export CSV ──
function exportCSV() {
  if (!allRecords.length) { alert('目前沒有資料可匯出'); return; }
  const header = ['送出時間','班級','座號','姓名','飛行比賽','攀爬比賽','跳遠比賽','游泳比賽','未分類'];
  const rows = allRecords.map(r => [
    r.time, r.class, r.number, r.name, r.fly, r.climb, r.jump, r.swim, r.pool
  ].map(v => `"${String(v||'').replace(/"/g,'""')}"`));
  const csv = '\uFEFF' + [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `昆蟲分類作答_${new Date().toLocaleDateString('zh-TW')}.csv`;
  document.body.appendChild(a);  // 必須加入 DOM，部分瀏覽器才能觸發下載
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── Clear records ──
function clearRecords() {
  if (!confirm('確定要清空所有學生作答資料？此操作無法復原！')) return;
  // 改用 POST，確保 GAS 有寫入試算表的權限
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'clearRecords', password: teacherPassword })
  })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        allRecords = [];
        renderTable([]);
        updateStats([]);
        alert('✅ 資料已清空');
      } else {
        alert('❌ 清空失敗：' + (data.error || ''));
      }
    })
    .catch(() => alert('❌ 連線失敗，請確認網路連線'));
}
</script>
</body>
</html>
